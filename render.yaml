databases:
  - name: pulsegrid-db
    plan: free
    databaseName: jobscheduler
    user: pulsegrid

services:
  - type: redis
    name: pulsegrid-redis
    plan: free
    ipAllowList: []

  - type: web
    name: pulsegrid-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: sh -c "node db/migrate.js && node src/index.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsegrid-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pulsegrid-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false

  