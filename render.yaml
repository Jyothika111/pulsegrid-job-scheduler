databases:
  - name: pulsegrid-db
    plan: free
    databaseName: jobscheduler
    user: pulsegrid

services:
  - type: redis
    name: pulsegrid-redis
    plan: free
    ipAllowList: []

  - type: web
    name: pulsegrid-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: sh -c "node db/migrate.js && node src/index.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsegrid-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pulsegrid-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: pulsegrid-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: node src/worker.js
    envVars:
      - key: API_URL
        sync: false
      - key: PROJECT_API_KEY
        sync: false
      - key: WORKER_QUEUES
        value: default
      - key: WORKER_CONCURRENCY
        value: 5
      - key: WORKER_POLL_INTERVAL_MS
        value: 1000
